remotes:
  - git_url: https://github.com/fohte/lefthook-config.git
    ref: v0.1.15 # renovate: datasource=github-tags depName=fohte/lefthook-config
    configs:
      - base.yml
      - rust.yml

pre-commit:
  commands:
    dump-openapi:
      priority: 1
      glob: '*.rs'
      run: cd backend && cargo run -- --dump-openapi > openapi.json.tmp && mv openapi.json.tmp openapi.json && cd .. && git add backend/openapi.json
    openapi-typescript:
      priority: 2
      glob: '*.rs'
      run: cd frontend && bun run generate:api && cd .. && git add frontend/src/lib/api/schema.gen.d.ts
    ast-grep:
      glob: '*.rs'
      run: ast-grep scan {staged_files}
    cargo-fmt:
      root: 'backend/'
    cargo-clippy:
      root: 'backend/'
