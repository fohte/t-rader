[env]
_.file = ['.env', '.env.local']
# Share target dir across worktrees to avoid full recompilation
CARGO_TARGET_DIR = "{{config_root}}/target"

[tools]
lefthook = "2.1.4"
"github:ast-grep/ast-grep" = "0.41.1"
"cargo:sea-orm-cli" = "2.0.0-rc.32"

# lefthook hooks
actionlint = "1.7.11"
bun = "1.3.10"
"github:fohte/basefmt" = "0.1.0"
"npm:@commitlint/cli" = "20.4.4"
"npm:prettier" = "3.8.1"
shellcheck = "0.11.0"
shfmt = "3.13.0"

[settings]
npm.bun = true
